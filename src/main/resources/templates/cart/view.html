<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Моя корзина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="mb-4">🛒 Ваша корзина</h1>

    <div th:if="${cart.items.isEmpty()}" class="alert alert-info">
        Корзина пуста. <a href="/products/catalog">Перейти к покупкам</a>
    </div>

    <div th:unless="${cart.items.isEmpty()}">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Товар</th>
                    <th>Цена</th>
                    <th>Количество</th>
                    <th>Итого</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart.items}">
                    <td th:text="${item.product.name}">Название товара</td>
                    <td th:text="${item.product.price + ' ₽'}">100 ₽</td>
                    <td th:text="${item.quantity}">1</td>
                    <td th:text="${item.product.price * item.quantity + ' ₽'}">100 ₽</td>
                </tr>
            </tbody>
            <tfoot>
                <tr class="table-dark">
                    <td colspan="3" class="text-end"><strong>Общая сумма:</strong></td>
                    <td><strong th:text="${cart.totalPrice + ' ₽'}">0 ₽</strong></td>
                </tr>
            </tfoot>
        </table>
        
        <div class="d-flex justify-content-between mt-4">
            <a href="/products/catalog" class="btn btn-secondary">Продолжить покупки</a>
            <a href="/orders/checkout" class="btn btn-success">Оформить заказ</a>
        </div>
    </div>
</div>

</body>
</html>
