<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Каталог выпечки</title>
    <!-- 1. Сначала Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 2. Потом jQuery (обязательно до наших скриптов) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        .card-img-top { height: 200px; object-fit: cover; }
        .price-tag { font-size: 1.25rem; font-weight: bold; color: #d63384; }
    </style>
</head>
<body>

<div class="container mt-5">
    <h1 class="mb-4 text-center">🥐 Свежая выпечка</h1>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="product : ${products.content}">
            <div class="card h-100 shadow-sm">
                <!-- Картинка -->
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300x200?text=Bakery'}" 
                     class="card-img-top" alt="Товар">
                
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${product.name}">Название товара</h5>
                    <p class="card-text text-muted small" th:text="${product.categoryName}">Категория</p>
                    <p class="card-text" th:text="${product.description}">Описание</p>
                    
                    <!-- 3. Input теперь ВНУТРИ card-body, чтобы JS мог его найти -->
                    <input type="hidden" class="product-id-input" th:value="${product.id}" />

                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <span class="price-tag" th:text="${product.price + ' ₽'}">0 ₽</span>
                        <!-- Добавили уникальный класс для кнопки -->
                        <button class="btn btn-outline-primary btn-sm add-to-cart-btn">В корзину</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Пагинация -->
    <nav aria-label="Page navigation" class="mt-4" th:if="${products.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                <a class="page-link" th:href="@{/products/catalog(page=${products.number - 1})}">Назад</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link">Страница <span th:text="${products.number + 1}">1</span> из <span th:text="${products.totalPages}">1</span></span>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                <a class="page-link" th:href="@{/products/catalog(page=${products.number + 1})}">Вперед</a>
            </li>
        </ul>
    </nav>
</div>

<!-- 4. Скрипт внутри body, после загрузки jQuery -->
<script>
    $(document).ready(function() {
        // Используем конкретный класс кнопки, чтобы не ломать другие кнопки на сайте
        $('.add-to-cart-btn').click(function(e) {
            e.preventDefault();
            let btn = $(this);
            
            // Ищем input внутри той же карточки (родитель .card-body)
            let productId = btn.closest('.card-body').find('.product-id-input').val(); 
            
            console.log("Добавляем товар ID: " + productId); // Для проверки в консоли браузера

            $.post('/cart/add', { productId: productId })
                .done(function(response) {
                    if(response.success) {
                        btn.text('✓ В корзине')
                           .removeClass('btn-outline-primary')
                           .addClass('btn-success');
                        
                        // Возвращаем кнопку в исходное состояние через 2 секунды
                        setTimeout(() => {
                            btn.text('В корзину')
                               .removeClass('btn-success')
                               .addClass('btn-outline-primary');
                        }, 2000);
                    }
                })
                .fail(function(xhr) {
                    console.error("Ошибка:", xhr.responseText);
                    alert("Не удалось добавить товар. Проверьте консоль.");
                });
        });
    });
</script>

</body>
</html>
