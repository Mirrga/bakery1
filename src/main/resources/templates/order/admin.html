<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление заказами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="mb-4">🛠️ Управление заказами (Админ)</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
        Заказов пока нет
    </div>

    <div th:unless="${#lists.isEmpty(orders)}">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>№</th>
                    <th>Клиент</th>
                    <th>Дата</th>
                    <th>Сумма</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td><a th:href="@{/orders/{id}(id=${order.id})}" th:text="${order.id}">1</a></td>
                    <td th:text="${order.user.username}">user</td>
                    <td th:text="${order.createdAt}">01.01.2024</td>
                    <td th:text="${order.totalAmount + ' ₽'}">1000 ₽</td>
                    <td>
                        <span class="badge" 
                              th:classappend="${order.status.name() == 'NEW'} ? 'bg-primary' : 
                                               (${order.status.name() == 'CONFIRMED'} ? 'bg-info' : 
                                               (${order.status.name() == 'READY'} ? 'bg-warning' : 
                                               (${order.status.name() == 'COMPLETED'} ? 'bg-success' : 'bg-danger')))"
                              th:text="${order.status.name()}">NEW</span>
                    </td>
                    <td>
                        <form th:action="@{/orders/admin/{id}/status(id=${order.id})}" method="post" class="d-inline">
                            <select name="status" class="form-select form-select-sm d-inline-block w-auto">
                                <option value="NEW" th:selected="${order.status.name() == 'NEW'}">NEW</option>
                                <option value="CONFIRMED" th:selected="${order.status.name() == 'CONFIRMED'}">CONFIRMED</option>
                                <option value="READY" th:selected="${order.status.name() == 'READY'}">READY</option>
                                <option value="COMPLETED" th:selected="${order.status.name() == 'COMPLETED'}">COMPLETED</option>
                                <option value="CANCELLED" th:selected="${order.status.name() == 'CANCELLED'}">CANCELLED</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary">OK</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <a href="/products/catalog" class="btn btn-secondary">← На главную</a>
    </div>
</div>

</body>
</html>
