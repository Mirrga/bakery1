<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои заказы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="mb-4">📋 Мои заказы</h1>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
        У вас пока нет заказов. <a href="/products/catalog">Перейти к покупкам</a>
    </div>

    <div th:unless="${#lists.isEmpty(orders)}">
        <div class="list-group">
            <a th:each="order : ${orders}" 
               th:href="@{/orders/{id}(id=${order.id})}"
               class="list-group-item list-group-item-action">
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1">Заказ №<span th:text="${order.id}"></span></h5>
                        <p class="mb-1">
                            <small class="text-muted">
                                Дата: <span th:text="${order.createdAt}">01.01.2024</span> | 
                                Товаров: <span th:text="${#lists.size(order.items)}">0</span>
                            </small>
                        </p>
                    </div>
                    <div class="text-end">
                        <p class="mb-1 fw-bold" th:text="${order.totalAmount + ' ₽'}">0 ₽</p>
                        <span class="badge" 
                              th:classappend="${order.status.name() == 'NEW'} ? 'bg-primary' : 
                                               (${order.status.name() == 'CONFIRMED'} ? 'bg-info' : 
                                               (${order.status.name() == 'READY'} ? 'bg-warning' : 
                                               (${order.status.name() == 'COMPLETED'} ? 'bg-success' : 'bg-danger')))"
                              th:text="${order.status.name()}">NEW</span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <div class="mt-4">
        <a href="/products/catalog" class="btn btn-primary">Продолжить покупки</a>
        <a href="/account/profile" class="btn btn-secondary">В профиль</a>
    </div>
</div>

</body>
</html>
