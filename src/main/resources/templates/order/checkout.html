<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Оформление заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="mb-4">📦 Оформление заказа</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row">
        <!-- Левая колонка: Форма доставки -->
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">
                    <h5>📍 Данные доставки</h5>
                </div>
                <div class="card-body">
                    <form action="/orders/create" method="post">
                        <div class="mb-3">
                            <label for="address" class="form-label">Адрес доставки</label>
                            <input type="text" class="form-control" id="address" name="address" 
                                   placeholder="Улица, дом, квартира" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Телефон</label>
                            <input type="tel" class="form-control" id="phone" name="phone" 
                                   placeholder="+7 (___) ___-__-__" required>
                        </div>
                        <div class="mb-3">
                            <label for="comment" class="form-label">Комментарий к заказу</label>
                            <textarea class="form-control" id="comment" name="comment" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">✅ Подтвердить заказ</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Правая колонка: Состав заказа -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5>🛒 Ваш заказ</h5>
                </div>
                <div class="card-body">
                    <table class="table table-sm">
                        <thead>
                            <tr>
                                <th>Товар</th>
                                <th>Кол-во</th>
                                <th>Сумма</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${cart.items}">
                                <td th:text="${item.product.name}">Название</td>
                                <td th:text="${item.quantity}">1</td>
                                <td th:text="${item.product.price * item.quantity + ' ₽'}">100 ₽</td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr class="table-dark">
                                <td colspan="2" class="text-end"><strong>Итого:</strong></td>
                                <td><strong th:text="${cart.totalPrice + ' ₽'}">0 ₽</strong></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a href="/cart" class="btn btn-secondary">← Вернуться в корзину</a>
    </div>
</div>

</body>
</html>
