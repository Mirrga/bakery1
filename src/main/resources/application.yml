spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bakery
    username: bakery
    password: bakery
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  thymeleaf:
    cache: false